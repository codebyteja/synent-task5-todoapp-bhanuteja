<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="box">
    <h1>📝 My To-Do List</h1>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task here...">
      <button onclick="addTask()">+ Add</button>
    </div>

    <ul id="taskList"></ul>

    <p id="emptyMsg">No tasks here!</p>
    <p id="counter"></p>

    <button class="clearbtn" onclick="clearAll()">Clear All</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
